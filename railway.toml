[build]
builder = "RAILPACK"

[deploy]
startCommand = "sh -c 'JAR=$(find . -name \"*.jar\" ! -name \"*original*\" | head -n 1) && exec java -XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -jar $JAR'"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
