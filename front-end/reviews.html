<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews
    </title>
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />



    <link rel="stylesheet" href="frontend.css">

    <link rel="shortcut icon" href="images/Logo.png" type="image/x-icon">



</head>

<style>
    #backButton {
        background-color: rgb(209, 213, 219);
        border-radius: 10px;
        font-size: large;
    }
</style>


<body>

    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
        <div id="navitem">
            <a class="navbar-brand" href="#">
                <img src="images/Logo.png" alt="Avatar Logo" class="rounded-pill">
            </a>
            <div id="head">
                <h1 style="color: white;">Customer Reviews </h1>
            </div>
            <div id="back-button">
            </div>
        </div>
    </nav>

    <div id="product-details">
        <label for="product-id">Product Id: </label>
        <input type="text" name="product-id" id="product-id" placeholder="Product Id:" disabled>

        <label for="product-name">Product Name: </label>
        <input type="text" name="product-name" id="product-name" placeholder="Product Name" disabled>
    </div>
    <hr class="container">

    <div id="reviews" class="container">

        <div class="row">
            <div class="col">

            </div>
            <div class="col">

            </div>
            <div class="col">

            </div>
        </div>

    </div>
    <div id="reviewPaginationControls" class="container" style="text-align: center; margin-top: 20px;"></div>

    <script>
        const apiURL = 'http://localhost:8081';

        // Automatically intercept fetch to inject JWT Bearer token
        const originalFetch = window.fetch;
        window.fetch = function (url, options = {}) {
            options.headers = options.headers || {};
            const token = localStorage.getItem("accessToken");
            if (token) {
                if (options.headers instanceof Headers) {
                    options.headers.set("Authorization", `Bearer ${token}`);
                } else {
                    options.headers["Authorization"] = `Bearer ${token}`;
                }
            }
            return originalFetch(url, options);
        };

        let reviewsPage = 0;
        let reviewsSize = 3;

        window.onload = () => {
            
            const url = window.location.href;
            const params = new URLSearchParams(window.location.search);
            let storeId = params.get('storeId');
            let productName = params.get('productName');
            let productId = params.get('productId');
            let backDiv=document.getElementById('back-button');
            backDiv.innerHTML=`<button id="backButton" type="button" value="${storeId}" onclick="goBackToInventory()">Go Back</button>`;
            document.getElementById('product-id').value = productId;
            document.getElementById('product-name').value = productName;
            setTimeout(() => {
                getReviews(storeId, productId);
            }, 500);

        }



        function getReviews(storeId, productId) {
            const reviewsContainer = document.getElementById('reviews');
            if (reviewsContainer) {
                reviewsContainer.innerHTML = '<div style="text-align:center; padding: 20px; font-weight:bold; color: white;">Loading reviews...</div>';
            }

            let url = `${apiURL}/reviews/${storeId}/${productId}?page=${reviewsPage}&size=${reviewsSize}&sort=id,asc`;
            fetch(url, {
                method: "GET",
                headers: { "content-type": "application/json" }
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Server returned status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (reviewsContainer) {
                        if (!data.reviews || data.reviews.length === 0) {
                            reviewsContainer.innerHTML = '<div style="text-align:center; padding: 20px; color: white; font-weight: bold;">No reviews available for this product yet.</div>';
                            renderReviewPagination(0, storeId, productId);
                        } else {
                            reviewsContainer.innerHTML = '<div class="row"><div class="col"></div><div class="col"></div><div class="col"></div></div>';
                            createReview(data.reviews);
                            renderReviewPagination(data.totalPages, storeId, productId);
                        }
                    }
                })
                .catch(error => {
                    console.error('Error loading reviews:', error);
                    if (reviewsContainer) {
                        reviewsContainer.innerHTML = `<div style="text-align:center; padding: 20px; color: red; font-weight: bold;">Error loading reviews: ${error.message}</div>`;
                    }
                });
        }

        function createReview(reviews) {
            try {


                let allColumns = document.querySelectorAll('.col');
                let count = 0;

                for (review of reviews) {

                    reviewcard = document.createElement('div');
                    reviewcard.classList.add('review-card');
                    customerName = document.createElement('div');
                    customerName.classList.add("customer-name");
                    customerSpan = document.createElement('span')
                    customerSpan.textContent = review.customerName;
                    customerName.appendChild(customerSpan);

                    reviewDiv = document.createElement('div');
                    reviewDiv.classList.add('review');

                    rating = document.createElement('div');
                    rating.classList.add('rating');

                    let i = 0
                    let listStar = "";

                    for (; i < review.rating; i++) {
                        listStar = listStar + "" + `<i class="fa-solid fa-star golden"></i>`;
                    }
                    for (; i < 5; i++) {
                        listStar = listStar + "" + `<i class="fa-solid fa-star"></i>`;
                    }
                    rating.innerHTML = listStar;

                    reviewDiv.appendChild(rating);

                    customerReview = document.createElement('div');
                    customerReview.classList.add('customer-review')
                    customerReview.textContent = review.review;
                    reviewDiv.appendChild(customerReview);
                    reviewcard.appendChild(customerName);
                    reviewcard.appendChild(reviewDiv);

                    allColumns[`${count % 3}`].appendChild(reviewcard);
                    count++;
                }
            }
            catch (error) {
                console.log(error);
            }

        }

        function goBackToInventory() {
            
            button=document.getElementById('backButton');
            storeId=button.value;
            location.href = `index.html?id=navBar3&storeid=${storeId}`;
        }

        function renderReviewPagination(totalPages, storeId, productId) {
            const controls = document.getElementById('reviewPaginationControls');
            if (!controls) return;
            controls.innerHTML = '';
            if (totalPages <= 1) return;

            const prevBtn = document.createElement('button');
            prevBtn.textContent = 'Previous';
            prevBtn.disabled = reviewsPage === 0;
            prevBtn.style.marginRight = '10px';
            prevBtn.style.padding = '5px 10px';
            prevBtn.onclick = () => {
                if (reviewsPage > 0) {
                    reviewsPage--;
                    getReviews(storeId, productId);
                }
            };

            const info = document.createElement('span');
            info.textContent = ` Page ${reviewsPage + 1} of ${totalPages} `;
            info.style.color = 'white';
            info.style.fontWeight = 'bold';

            const nextBtn = document.createElement('button');
            nextBtn.textContent = 'Next';
            nextBtn.disabled = reviewsPage >= totalPages - 1;
            nextBtn.style.marginLeft = '10px';
            nextBtn.style.padding = '5px 10px';
            nextBtn.onclick = () => {
                if (reviewsPage < totalPages - 1) {
                    reviewsPage++;
                    getReviews(storeId, productId);
                }
            };

            controls.appendChild(prevBtn);
            controls.appendChild(info);
            controls.appendChild(nextBtn);
        }

    </script>



</body>

</html>
