<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMS: Manage Inventory
    </title>
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



    <link rel="stylesheet" href="frontend.css">
    <link rel="shortcut icon" href="images/Logo.png" type="image/x-icon">

    <script src="script.js"></script>







</head>

<body>

    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
        <div id="navitem">
            <a class="navbar-brand" href="#">
                <img src="images/Logo.png" alt="Avatar Logo" class="rounded-pill">
            </a>
            <div id="head">
                <h1 style="color: white;">Edit Product</h1>
            </div>
        </div>

    </nav>







    <div id="form" style="display: flex;">
        <form id="myform" onsubmit="updateParentProduct(event)">

            <div>
                <label for="pproductId"> Product Id:</label>
                <input type="number" name="pproductId" id="pproductId" placeholder=" Product Id" disabled>
            </div>
            <div>
                <label for="pproductName"> Product Name:</label>
                <input type="text" name="pproductName" id="pproductName" placeholder=" Product Name" required>
            </div>

            <div>
                <label for="pcategory">Select Category:</label>
                <select name="pcategory" class="category" id="pcategory" required>
                    <option value="" selected disabled>Select category</option>
                </select>
            </div>

            <div>
                <label for="psupplier">Select Supplier:</label>
                <select name="psupplier" class="category" id="psupplier">
                    <option value="" selected disabled>Select supplier</option>
                </select>
            </div>

            <div>
                <label for="pproductPrice"> Price:</label>
                <input type="text" name="pproductPrice" id="pproductPrice" placeholder=" price in $" required>
            </div>

            <div>
                <label for="pSKU"> SKU:</label>
                <input type="text" name="pSKU" id="pSKU" placeholder=" SKU">
            </div>

            <div>
                <label for="productImage">Product Image:</label>
                <input type="file" id="productImage" accept="image/*" onchange="uploadProductImage()">
                <input type="hidden" id="parentImageUrl">
                <img id="imagePreview" src="" style="max-height: 100px; display: none; margin-top: 10px; border-radius: 4px; border: 1px solid #ccc;">
            </div>

            <div>
                <input type="submit" value="Update product">
            </div>
        </form>

        <!-- Barcode / QR Code Preview Panel -->
        <div id="barcodePanel" style="margin-left: 40px; text-align: center; min-width: 280px;">
            <h4>Product QR Code</h4>
            <img id="qrCodeImage" src="" alt="QR Code" style="max-width: 250px; max-height: 250px; border: 1px solid #ccc; border-radius: 8px; display: none;">
            <p id="qrCodeSku" style="margin-top: 8px; font-weight: bold; color: #333;"></p>
            <div style="margin-top: 12px;">
                <button type="button" onclick="switchBarcodeType('qr')" style="margin-right: 8px;" class="btn btn-sm btn-outline-primary">QR Code</button>
                <button type="button" onclick="switchBarcodeType('barcode')" class="btn btn-sm btn-outline-secondary">Barcode</button>
            </div>
        </div>
    </div>



    <script>
        let currentProductId = null;
        let currentBarcodeType = 'qr';

        window.onload = async () => {
            const url = window.location.href;
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('productId');
            currentProductId = productId;
            document.getElementById('pproductId').value = productId;

            await loadCategoriesAndSuppliers();
            getProductByid(productId);
            loadBarcode(productId, currentBarcodeType);
        }

        function loadBarcode(productId, type) {
            if (!productId) return;
            const token = localStorage.getItem('jwtToken');
            const img = document.getElementById('qrCodeImage');
            // Use fetch to get image with auth header
            fetch(`http://localhost:8081/product/${productId}/barcode?type=${type}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(response => {
                if (!response.ok) throw new Error('Barcode not available');
                return response.blob();
            })
            .then(blob => {
                img.src = URL.createObjectURL(blob);
                img.style.display = 'block';
            })
            .catch(err => {
                img.style.display = 'none';
                console.log('Barcode load error:', err);
            });
        }

        function switchBarcodeType(type) {
            currentBarcodeType = type;
            loadBarcode(currentProductId, type);
        }

    </script>


</body>

</html>
