spring.application.name=code
server.port=${PORT:8080}

# Database settings supporting Railway auto-injected variables or custom DB_URL
spring.datasource.url=${MYSQL_URL:${DB_URL:jdbc:mysql://localhost:3306/inventory?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}}
spring.datasource.username=${MYSQLUSER:${DB_USERNAME:root}}
spring.datasource.password=${MYSQLPASSWORD:${DB_PASSWORD:root}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# MongoDB configuration supporting Railway auto-injected MONGO_URL
spring.data.mongodb.uri=${MONGO_URL:${MONGO_URI:mongodb://localhost:27017/inventordb}}

# Health & Actuator configuration for Railway probes
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.db.enabled=true
management.health.redis.enabled=false
management.health.mail.enabled=false
management.health.mongo.enabled=false

# Frontend CORS
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175,http://localhost:5176,http://127.0.0.1:5176,http://localhost:5177,http://127.0.0.1:5177,http://localhost:4173,http://127.0.0.1:4173,http://localhost:5500,http://127.0.0.1:5500}

# JWT Configurations
jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e5f9c8b7d6a5e4f3d2c1b0a9f8e7d6c5b4a3f2e1d0c9b8a7f6e}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:86400000}

# Swagger UI configuration
springdoc.swagger-ui.path=/swagger-ui.html

# Google OAuth Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder-secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Spring Cache & Redis Configuration
spring.cache.type=${SPRING_CACHE_TYPE:simple}
spring.data.redis.url=${REDIS_URL:}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# Database Initialization
spring.sql.init.mode=${DB_INITIALIZE:never}
spring.sql.init.schema-locations=classpath:db/full-schema-and-seed.sql

# Mail Server Configuration (Optional for live SMTP delivery)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
