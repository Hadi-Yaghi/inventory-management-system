spring.application.name=code
server.port=8081
spring.datasource.url=jdbc:mysql://localhost:3306/inventory?usessl=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/inventordb}
management.endpoint.health.show-details=always
management.health.db.enabled=true
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5500,http://127.0.0.1:5500}

# JWT Configurations
jwt.secret=9a4f2c8d3b7a1e5f9c8b7d6a5e4f3d2c1b0a9f8e7d6c5b4a3f2e1d0c9b8a7f6e
jwt.access-expiration=3600000
jwt.refresh-expiration=86400000

# Swagger UI configuration
springdoc.swagger-ui.path=/swagger-ui.html