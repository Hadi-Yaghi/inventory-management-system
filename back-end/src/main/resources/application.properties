spring.application.name=code
server.port=8081
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/inventory?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/inventordb}
management.endpoint.health.show-details=always
management.health.db.enabled=true
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173,http://localhost:5500,http://127.0.0.1:5500}

# JWT Configurations
jwt.secret=${JWT_SECRET}
jwt.access-expiration=3600000
jwt.refresh-expiration=86400000

# Swagger UI configuration
springdoc.swagger-ui.path=/swagger-ui.html
